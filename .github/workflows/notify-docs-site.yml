# Triggers a rebuild of the KIParla documentation site whenever the docs/ folder
# of this module changes on main.
#
# Required secret in this repo:
#   DOCS_SITE_TOKEN — a GitHub PAT with `repo` scope on KIParla/docs-site
#   (Settings → Secrets and variables → Actions → New repository secret)

name: Notify Docs Site on Docs Change

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch rebuild to KIParla/docs-site
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DOCS_SITE_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'KIParla',
              repo: 'docs-site',
              event_type: 'docs-updated',
              client_payload: {
                module: context.repo.repo,
                ref: context.ref,
              },
            });
